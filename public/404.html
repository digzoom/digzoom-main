<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA fallback: redirect /login → /#/login
    var path = window.location.pathname;
    var hash = window.location.hash;
    if (!hash.startsWith('#/')) {
      window.location.replace('/#' + path + window.location.search + window.location.hash);
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
